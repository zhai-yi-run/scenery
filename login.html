<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 山野秘境</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <h2>欢迎回来</h2>
        <p class="subtitle">登录山野秘境，继续你的探索之旅</p>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
                <span class="error-msg" id="username-error"></span>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
                <span class="error-msg" id="password-error"></span>
            </div>

            <button type="submit" class="auth-btn">登 录</button>
        </form>

        <p class="auth-switch">还没有账号？<a href="register.html">立即注册</a></p>
        <p class="auth-switch" style="margin-top:8px;"><a href="index.html">← 返回首页</a></p>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('login-form');
        const username = document.getElementById('username');
        const password = document.getElementById('password');
        const usernameError = document.getElementById('username-error');
        const passwordError = document.getElementById('password-error');

        function showError(input, errorEl, msg) {
            input.classList.add('error');
            input.classList.remove('success');
            errorEl.textContent = msg;
            errorEl.classList.add('show');
        }

        function showSuccess(input) {
            input.classList.remove('error');
            input.classList.add('success');
        }

        function hideError(input, errorEl) {
            input.classList.remove('error', 'success');
            errorEl.classList.remove('show');
        }

        // 实时验证：用户名
        username.addEventListener('input', function() {
            if (username.value.trim() === '') {
                showError(username, usernameError, '用户名不能为空');
            } else {
                showSuccess(username);
                usernameError.classList.remove('show');
            }
        });

        // 实时验证：密码
        password.addEventListener('input', function() {
            if (password.value.trim() === '') {
                showError(password, passwordError, '密码不能为空');
            } else {
                showSuccess(password);
                passwordError.classList.remove('show');
            }
        });

        // 失焦验证
        username.addEventListener('blur', function() {
            if (username.value.trim() === '') {
                showError(username, usernameError, '用户名不能为空');
            }
        });

        password.addEventListener('blur', function() {
            if (password.value.trim() === '') {
                showError(password, passwordError, '密码不能为空');
            }
        });

        // 表单提交验证
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            let valid = true;

            if (username.value.trim() === '') {
                showError(username, usernameError, '用户名不能为空');
                valid = false;
            }

            if (password.value.trim() === '') {
                showError(password, passwordError, '密码不能为空');
                valid = false;
            }

            if (valid) {
                alert('登录成功！欢迎 ' + username.value.trim() + ' 回到山野秘境。\n');
                window.location.href = 'index.html';
            }
        });
    });
    </script>
</body>
</html>
