    <header class="page-hero" style="background: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), url('https://images.unsplash.com/photo-1529921879218-f99546d03a9d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover;">

                    <h3>西藏人文之旅</h3>

    <footer>

    <button class="back-to-top" id="back-to-top" title="返回顶部">↑</button>

    <script>
    window.addEventListener('scroll', function() {
        const navbar = document.getElementById('navbar');
        const backBtn = document.getElementById('back-to-top');
        if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
        if (window.scrollY > 400) {
            backBtn.classList.add('show');
        } else {
            backBtn.classList.remove('show');
        }
    });

    document.addEventListener('DOMContentLoaded', function() {
        const backBtn = document.getElementById('back-to-top');
        if (backBtn) {
            backBtn.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }
    });
    </script>
